<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial scale=1" />
    <title>matthew-kennedy.com</title>
    <link rel="icon" href="assets/mkp-icon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="contact.css" />
    <script src="script.js"></script>
  </head>

  <body>
    <special-header></special-header>

    <!--Nav links-->
    <special-nav></special-nav>

    <hr class="nav-line" />

    <h1 class="title">Contact Me</h1>

    <hr class="title-line" />

    <section id="contact">
      <h3 class="title">First Name</h3>
      <div>
        <input class="input-box" type="text" required />
      </div>
      <h3 class="title">Last Name</h3>
      <div>
        <input type="text" required />
      </div>
      <h3 class="title">Email Address</h3>
      <div>
        <input type="text" required />
      </div>
      <h3 class="title">Phone Number</h3>
      <div>
        <input type="text" />
      </div>
      <h3 class="title">Preferred Contact</h3>
      <div class="radio-group">
        <label>
          <input type="radio" name="contactMethod" value="Email" required />
          Email
        </label>

        <label>
          <input type="radio" name="contactMethod" value="Text" />
          Text Message
        </label>

        <label>
          <input type="radio" name="contactMethod" value="Phone" />
          Phone Call
        </label>
      </div>
    </section>

    <div class="sample-text"></div>

    <special-footer></special-footer>

    <script src="header.js"></script>
    <script src="nav.js"></script>
  </body>
</html>
